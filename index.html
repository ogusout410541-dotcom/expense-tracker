    /* ─── 口座残高計算（全期間の全トランザクションを集計）─── */
    function calcBalances() {
        const bal = {};
        accounts.forEach(a => { bal[a.name] = a.initial; });

        // incomeRecords を反映:
        //   pending  → 未収入金（予定給与等）口座にプール
        //   received → 指定口座に加算
        incomeRecords.forEach(r => {
            if (r.status === 'received') {
                if (bal.hasOwnProperty(r.account)) bal[r.account] += r.amount;
            } else {
                if (bal.hasOwnProperty(ACCRUED_INCOME_ACCOUNT)) bal[ACCRUED_INCOME_ACCOUNT] += r.amount;
            }
        });

        // 資金移動: fromAccount を減算 → toAccount を加算（純資産合計への影響ゼロ）
        transfers.forEach(t => {
            if (bal.hasOwnProperty(t.fromAccount)) bal[t.fromAccount] -= t.amount;
            if (bal.hasOwnProperty(t.toAccount))   bal[t.toAccount]   += t.amount;
        });

        // 支出を paymentSource の口座から減算
        // ・実口座（四国銀行等）: 即時残高が減る
        // ・CC仮想口座: initial:0 からマイナスになり、クレカ未払い負債額を示す
        const accNames = new Set(accounts.map(a => a.name));
        items.forEach(item => {
            if (item.paymentSource && accNames.has(item.paymentSource)) {
                bal[item.paymentSource] -= item.originalAmount;
            }
        });

        const total = Object.values(bal).reduce((s, v) => s + v, 0);
        return { accounts: bal, total };
    }

    /* ─── 口座残高 DOM 更新 ─── */
    function updateBalanceDOM() {
        const container = document.getElementById('balanceSection');
        if (!container) return;
        const { accounts: bal, total } = calcBalances();
        const fmt = n => {
            const sign = n < 0 ? '−' : '';
            return `${sign}¥${Math.abs(n).toLocaleString()}`;
        };
        // 3区分に分離して表示: 実口座 / 未収入金（プラス仮想）/ CC（マイナス仮想）
        const realAccounts    = accounts.filter(a => a.name !== PAYMENT_SOURCE_CREDIT && a.name !== ACCRUED_INCOME_ACCOUNT);
        const accruedAccount  = accounts.find(a => a.name === ACCRUED_INCOME_ACCOUNT);
        const ccAccount       = accounts.find(a => a.name === PAYMENT_SOURCE_CREDIT);

        const realRows = realAccounts.map(a => {
            const v = bal[a.name] ?? a.initial;
            const color = v < 0 ? '#f87171' : v < 1000 ? '#fcd34d' : '#6ee7b7';
            return `<div class="balance-row">
                <span class="balance-acc-name">${escHtml(a.name)}</span>
                <span class="balance-acc-val" style="color:${color};">${fmt(v)}</span>
            </div>`;
        }).join('');

        // 未収入金: 青みがかった色で「未来の資産」として表示
        const accruedRow = accruedAccount ? (() => {
            const v = bal[accruedAccount.name] ?? 0;
            const color = v > 0 ? '#60a5fa' : '#475569';
            return `<div class="balance-row" style="border-top:1px solid rgba(96,165,250,0.18);margin-top:4px;padding-top:6px;">
                <span class="balance-acc-name" style="color:#93c5fd;">⏳ ${escHtml(accruedAccount.name)}</span>

        })() : '';

        // CC 負債: オレンジ系で「マイナス負債」として表示
        const ccRow = ccAccount ? (() => {
            const v = bal[ccAccount.name] ?? 0;
            return `<div class="balance-row" style="border-top:1px solid rgba(251,146,60,0.2);margin-top:4px;padding-top:6px;">

                <span class="balance-acc-val" style="color:#fb923c;">${fmt(v)}</span>
            </div>`;
        })() : '';
        const totalColor = total < 0 ? '#f87171' : '#34d399';
        container.innerHTML = `
        <div class="balance-panel">
            <div class="balance-header">
                <span class="balance-title">🏦 口座残高</span>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="btn-income-entry" id="incomeManageBtn">💴 収入を管理</button>
                    <button class="btn-transfer" id="transferBtn">🔄 資金移動</button>

            ${realRows}
            ${accruedRow}
            ${ccRow}
            <div class="balance-total-row">
                <span class="balance-total-label">純資産（実口座＋未収入 − クレカ負債）</span>
                <span class="balance-total-val" style="color:${totalColor};">${fmt(total)}</span>
            </div>
        </div>`;
        document.getElementById('incomeManageBtn')?.addEventListener('click', showIncomeManageModal);
        document.getElementById('transferBtn')?.addEventListener('click', showTransferModal);
    }

    /* ─── レンダリング ─── */
    function render() {
        const monthItems = getMonthItems();
        const s = calcSummary(monthItems);

        if (monthItems.length === 0) {
            // 全体に項目があるが、この月にはない場合とそうでない場合で文言を変える

            document.getElementById('itemCount').textContent = '';

            document.getElementById('itemCount').textContent = `${monthItems.length}件`;

            let displayItems = [...monthItems];
            if (filterMode !== 'all') displayItems = displayItems.filter(i => i.type === filterMode);

            // NEW: isNew の項目を常に先頭に固定してからソート
            displayItems.sort((a, b) => {
                if (a.isNew && !b.isNew) return -1;
                if (!a.isNew && b.isNew) return  1;
                // 同じグループ内は通常のソート
                if (sortMode === 'date-desc')   return b.date.localeCompare(a.date);
                if (sortMode === 'date-asc')    return a.date.localeCompare(b.date);
                if (sortMode === 'amount-desc') return b.originalAmount - a.originalAmount;
                if (sortMode === 'amount-asc')  return a.originalAmount - b.originalAmount;
                if (sortMode === 'type')        return a.type.localeCompare(b.type);
                return 0;
            });

            if (displayItems.length === 0) {
                itemsContainer.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div>該当する項目がありません</div></div>`;

    /* ─── ユーティリティ ─── */
    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
        return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    }

    /* ─── クラウド同期 ─── */

    function setSyncIndicator(state, text) {
        const el = document.getElementById('syncIndicator');
        if (!el) return;
        el.className = 'state-' + state;
        el.innerHTML = state === 'syncing'
            ? `<span class="sync-spin">🔄</span> ${text}`
            : state === 'ok'
            ? `✅ ${text}`
            : state === 'error'
            ? `⚠️ ${text}`
            : '';
        if (state === 'ok') {
            clearTimeout(el._hideTimer);
            el._hideTimer = setTimeout(() => { el.className = 'state-idle'; }, 3000);
        }
    }

    function buildPayload() {
        return {
            items, itemId, budgets, incomes, cards, cardBudgets,
            userCategories, accounts,
            incomeRecords, incomeRecordId, transfers, transferId,
            updatedAt,
        };
    }

    function applyCloudPayload(data) {
        if (!data || typeof data !== 'object') return false;
        try {
            if (Array.isArray(data.items) && data.items.length) items = data.items;
            if (typeof data.itemId === 'number') itemId = data.itemId;
            if (data.budgets)       budgets      = data.budgets;
            if (data.incomes)       incomes      = data.incomes;
            if (Array.isArray(data.cards) && data.cards.length) cards = data.cards;
            if (data.cardBudgets)   cardBudgets  = data.cardBudgets;
            if (Array.isArray(data.userCategories) && data.userCategories.length) userCategories = data.userCategories;
            if (Array.isArray(data.accounts) && data.accounts.length) accounts = data.accounts;
            if (Array.isArray(data.incomeRecords))  incomeRecords  = data.incomeRecords;
            if (typeof data.incomeRecordId === 'number') incomeRecordId = data.incomeRecordId;
            if (Array.isArray(data.transfers))  transfers  = data.transfers;
            if (typeof data.transferId === 'number') transferId = data.transferId;
            if (typeof data.updatedAt === 'number') updatedAt = data.updatedAt;
            return true;
        } catch(e) { return false; }
    }

    async function fetchFromCloud() {
        if (!cloudSyncUrl) return null;
        const res = await fetch(cloudSyncUrl, {
            method: 'GET',
            mode: 'cors',
            cache: 'no-store',
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    }

    async function pushToCloud() {
        if (!cloudSyncUrl) return;
        setSyncIndicator('syncing', '同期中...');
        try {
            const payload = buildPayload();
            const res = await fetch(cloudSyncUrl, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload),
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            setSyncIndicator('ok', '同期済み');
        } catch(e) {
            console.error('[pushToCloud] 同期失敗:', e);
            setSyncIndicator('error', 'オフライン');
        }
    }

    async function syncWithCloud() {
        if (!cloudSyncUrl) return;
        setSyncIndicator('syncing', '同期中...');
        try {
            const cloudData = await fetchFromCloud();
            if (!cloudData) { setSyncIndicator('error', '取得失敗'); return; }

            const cloudTs = typeof cloudData.updatedAt === 'number' ? cloudData.updatedAt : 0;

            if (cloudTs > updatedAt) {
                // クラウドが新しい → ローカルに適用
                if (applyCloudPayload(cloudData)) {
                    // ローカルに保存（タイムスタンプ上書きしない）
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(buildPayload()));
                    } catch(e) {}
                    scheduleRender();
                    updateBalanceDOM();
                    updateCategoryBudget(getMonthItems());
                    setSyncIndicator('ok', '最新データを取得');
                } else {
                    setSyncIndicator('error', 'マージエラー');
                }
            } else if (updatedAt > cloudTs) {
                // ローカルが新しい → クラウドへプッシュ
                await pushToCloud();
            } else {
                // 同一 → 何もしない
                setSyncIndicator('ok', '最新');
            }
        } catch(e) {
            console.error('[syncWithCloud] 同期失敗:', e);
            setSyncIndicator('error', 'オフライン');
        }
    }

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">

        <button class="modal-btn modal-btn-sub" id="cloudTestBtn" style="flex:1;min-height:44px;">🔄 今すぐ同期</button>
    </div>
    <div style="display:flex;gap:8px;">
        <button class="modal-btn modal-btn-cancel" id="cloudClearBtn" style="flex:1;color:#f87171;">🗑 URL を削除</button>

    </div>
</div>`;

        document.body.appendChild(overlay);

        overlay.querySelector('#cloudSaveBtn').addEventListener('click', () => {

            if (url) syncWithCloud();
        });

        overlay.querySelector('#cloudTestBtn').addEventListener('click', async () => {
            const url = overlay.querySelector('#cloudUrlInput').value.trim();
            if (!url) { showNotification('URLを入力してください', 'error'); return; }
            // 一時的に適用してテスト
            const prev = cloudSyncUrl;
            cloudSyncUrl = url;
            overlay.remove();
            await syncWithCloud();
            cloudSyncUrl = prev; // テスト後は元に戻す（保存はSaveボタン）
        });

        overlay.querySelector('#cloudClearBtn').addEventListener('click', () => {
            cloudSyncUrl = '';
            localStorage.removeItem(CLOUD_URL_KEY);
            overlay.remove();
            showNotification('同期URLを削除しました', 'info');
        });

        overlay.querySelector('#cloudCloseBtn').addEventListener('click', () => overlay.remove());
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    }

    function showNotification(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = 'notification' + (type === 'error' ? ' error' : type === 'info' ? ' info' : '');
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2800);
    }

    /* ─── モーダル開閉時のbodyスクロール制御 ─────────────────────────
       MutationObserverで .modal-overlay の追加/削除を監視し、
       存在する間は body.modal-open を付与してiOSスクロールチェーンを封じる ── */
    let _scrollY = 0;
    new MutationObserver(() => {
        const hasModal = !!document.querySelector('.modal-overlay');
        if (hasModal && !document.body.classList.contains('modal-open')) {
            _scrollY = window.scrollY;
            document.body.classList.add('modal-open');
            document.body.style.top = `-${_scrollY}px`;
        } else if (!hasModal && document.body.classList.contains('modal-open')) {
            document.body.classList.remove('modal-open');
            document.body.style.top = '';
            window.scrollTo({ top: _scrollY, behavior: 'instant' });
        }
    }).observe(document.body, { childList: true });

    /* ─── 初期化 ─── */
    const wasRestored = loadFromStorage();
    applyMonthDefaults(selectedMonth);
    updateMonthDisplay();
    scheduleRender();
    updateBalanceDOM();

    // クラウド同期ボタンのリスナー登録
    document.getElementById('cloudSyncBtn')?.addEventListener('click', showCloudSyncModal);

    // 起動時クラウド同期（ローカル復元後に最新データをフェッチ）
    if (cloudSyncUrl) {
        requestAnimationFrame(() => syncWithCloud());
    }

    // タブがアクティブになった瞬間に最新データをフェッチ（モバイル切り替え対策）
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && cloudSyncUrl) {
            syncWithCloud();
        }
    });

    // アコーディオン切り替えボタンの初期化
    // 2カラムレイアウト（PC）ではsummary-colが独立スクロールするため常時展開。
    // スマホ（≦768px）は縦積みで画面が圧迫されるため初期状態を折りたたむ。
    requestAnimationFrame(() => {
        const toggleBtn     = document.getElementById('summaryToggleBtn');
        const collapsible   = document.getElementById('summaryCollapsible');
        const summaryEl2    = document.getElementById('summarySection');
        let summaryCollapsed = false;

        if (toggleBtn && collapsible) {
            // スマホでは初期折りたたみ
            if (window.innerWidth <= 768) {
                summaryCollapsed = true;
                summaryEl2?.classList.add('collapsed');
                collapsible.style.maxHeight = '0';
                toggleBtn.textContent = '▼ 展開する';
            } else {
                collapsible.style.maxHeight = collapsible.scrollHeight + 'px';
            }

            toggleBtn.addEventListener('click', () => {
                summaryCollapsed = !summaryCollapsed;
                summaryEl2?.classList.toggle('collapsed', summaryCollapsed);
                if (summaryCollapsed) {
                    collapsible.style.maxHeight = '0';
                    toggleBtn.textContent = '▼ 展開する';
                } else {
                    collapsible.style.maxHeight = collapsible.scrollHeight + 'px';
                    toggleBtn.textContent = '▲ 折りたたむ';
                }
            });
        }
    });

    // ミニバー (折りたたみ時の要約表示) を更新する関数
    function updateMiniBar(s) {
        const income  = getMonthIncome(selectedMonth);
        const { total: totalAssets } = calcBalances();
        const currentEst = income > 0 ? income - (s.finalBurden || 0) - (s.toCollect || 0) : null;
        const fmtM = n => `¥${Math.abs(n).toLocaleString()}`;
        document.getElementById('smb-total')   && (document.getElementById('smb-total').textContent   = `総支出 ${fmtM(s.totalAmount || 0)}`);
        document.getElementById('smb-burden')  && (document.getElementById('smb-burden').textContent  = `自己負担 ${fmtM(s.finalBurden || 0)}`);
        document.getElementById('smb-savings') && (document.getElementById('smb-savings').textContent = currentEst !== null ? `手元残り ${currentEst < 0 ? '−' : ''}${fmtM(currentEst)}` : `総資産 ${fmtM(totalAssets)}`);
    }

    if (wasRestored) {
        requestAnimationFrame(() => {
            const banner = document.createElement('div');
            banner.style.cssText = [
                'font-size:13px', 'color:#6ee7b7', 'background:rgba(16,185,129,0.12)',
                'border:1px solid rgba(52,211,153,0.3)', 'border-radius:8px',
                'padding:8px 14px', 'margin-bottom:12px',
                'display:flex', 'justify-content:space-between', 'align-items:center'
            ].join(';');
            banner.innerHTML = `<span>💾 前回の入力内容を復元しました（全${items.length}件）</span><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:#64748b;font-size:16px;line-height:1;">✕</button>`;
            document.querySelector('.items-section')?.insertAdjacentElement('beforebegin', banner);
        });
    }
</script>
</body>
</html>
